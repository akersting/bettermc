on:
  push:
  pull_request:
  workflow_dispatch:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
          - {os: ubuntu-latest,   r: 'oldrel-2'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Run the check but do not fail on its results here; the gate step below
      # decides, so that the single known non-API-calls WARNING can be tolerated
      # (bettermc deliberately uses a few non-API entry points, see #9).
      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"never"'
          upload-snapshots: true

      - name: Fail on any check result except the known non-API WARNING
        shell: Rscript {0}
        run: |
          log <- Sys.glob(file.path("check", "*.Rcheck", "00check.log"))
          if (length(log) != 1L) stop("could not locate a unique 00check.log")
          chk <- rcmdcheck::parse_check(log)
          # Tolerate ONLY the non-API-calls WARNING; fail on everything else
          # (any error, or any other warning).
          unexpected <- chk$warnings[!grepl("non-API", chk$warnings)]
          cat(sprintf("R CMD check: errors=%d warnings=%d (tolerated=%d) notes=%d\n",
                      length(chk$errors), length(chk$warnings),
                      sum(grepl("non-API", chk$warnings)), length(chk$notes)))
          if (length(chk$errors) || length(unexpected)) {
            stop("R CMD check reported problems beyond the tolerated non-API WARNING.")
          }
